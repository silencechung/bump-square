# Install pnpm deps, build the Astro app, and type-check with tsc.
# Node 20 is excluded — package.json's engines pins >=22.12.0, so testing on
# 20 would always lie about compatibility.

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v4
    # pnpm/action-setup reads the `packageManager` field in package.json to
    # pick the right version, so we don't need to hardcode it here.
    - uses: pnpm/action-setup@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - run: pnpm run build
    - run: pnpm exec tsc --noEmit
